      - heading "1987 Program Snapshot" [level=2] [ref=e362]
      - generic [ref=e363]: Steve played his minor hockey in Surrey and while still in midget, played several games at the Junior 'B' level. Steve was a starter on the Sockeyes team this year.
      - paragraph [ref=e364]: "Source: 1987 Abbott Cup / Centennial Cup Souvenir Program"
      - heading "Biography" [level=2] [ref=e365]
      - generic [ref=e366]:
        - heading "Steve Jaques — Career Biography" [level=1] [ref=e367]
        - blockquote [ref=e368]:
          - paragraph [ref=e369]:
            - strong [ref=e370]: "Source:"
            - text: Primary research from 1987 newspaper coverage (2,725 OCR extractions from newspapers.com) plus hockeydb and eliteprospects career records. Every factual claim below ties to a cited imageId or season-line on hockeydb.
        - heading "Vitals" [level=2] [ref=e371]
        - list [ref=e372]:
