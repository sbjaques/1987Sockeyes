        - heading "The Sockeyes season (1986-87)" [level=2] [ref=e381]
        - paragraph [ref=e382]:
          - text: Jaques was traded
          - strong [ref=e383]: from the Humboldt Broncos to the Richmond Sockeyes mid-season
          - text: ", a fact made public in a Nanaimo Daily News note on April 29, 1987 (\"Jaques who was with the Broncos earlier this year…\") and detailed in a Star-Phoenix column the week of the Centennial Cup final. Richmond faced Humboldt nine times in three weeks across the Abbott Cup final and the Centennial Cup, producing repeated personal collisions with his former team. Asked about it on the eve of Richmond's round-robin game with Humboldt, Jaques said:"
          - emphasis [ref=e384]: "\"We knew we had to play each other again in the Centennial Cup; it's not like we wanted to be buddies with them. I don't blame them.\""
          - text: (Star-Phoenix, May 6 1987, image
          - link "512095951" [ref=e385] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-05-06-star-phoenix-p19-i512095951.md
          - text: ).
        - paragraph [ref=e386]:
          - text: "Jaques played a physical, forechecking game. In the BCJHL final (the Sockeyes swept Kelowna Packers 5-0 in a best-of-nine to win the Fred Page Cup), he set up Jason Phillips's championship-clinching goal in Game 5 at 9:31 of the third period: Phillips deflected Jaques's point shot past goaltender Dusty Imoo, recovered the rebound, and scored. Phillips gave Jaques, Brian Kozak, and Bill Hardy explicit credit for winning the puck on the forecheck (Vancouver Sun, Mar 25 1987, image"
          - link "495157862" [ref=e387] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-03-25-the-vancouver-sun-p25-i495157862.md
          - text: ).
        - paragraph [ref=e388]:
          - text: In the Doyle Cup series against the Red Deer Rustlers, a Vancouver Sun photograph captioned "Sockeyes' Steve Jaques sticks to his man like glue" shows him defending Red Deer's Pete deGraaf (Vancouver Sun, April 8 1987, image
          - link "495088209" [ref=e389] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-04-08-the-vancouver-sun-p24-i495088209.md
          - text: ). The Province ran a separate action photo captioned "Sockeyes' Steve Jaques outraces Packer player for puck" from the BCJHL final (The Province, Mar 25 1987, image
          - link "502054045" [ref=e390] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-03-25-the-province-p20-i502054045.md
          - text: ).
        - paragraph [ref=e391]:
          - text: During the Centennial Cup round-robin loss to host Humboldt on May 6 (Humboldt 6, Richmond 1), box scores record Jaques taking roughing and fighting / game-misconduct penalties (Star-Phoenix May 7 1987 p.20, image
          - link "512096840" [ref=e392] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-05-07-star-phoenix-p20-i512096840.md
          - text: ; May 5 1987 p.17, image
          - link "512094503" [ref=e393] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-05-05-star-phoenix-p17-i512094503.md
          - text: ). He scored in the 9-3 Centennial Cup semifinal win over the Pembroke Lumber Kings on May 7 (Times Colonist May 8 1987 p.12, image
          - link "508631348" [ref=e394] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-05-08-times-colonist-p12-i508631348.md
          - text: ; The Leader-Post May 8 1987 p.42, image
          - link "496960544" [ref=e395] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-05-08-the-leader-post-p42-i496960544.md
          - text: ).
        - paragraph [ref=e396]:
          - strong [ref=e397]: Game 5 of the Abbott Cup final (April 28, 1987, Humboldt 4 Richmond 3 OT).
          - text: "In the 10-minute full-time overtime, Jaques was assessed a five-minute match penalty for butting Humboldt's leading scorer Bill McDougall with his helmet, at or around 3:02 of OT. McDougall dropped, face down on the ice, bleeding from the mouth, and was helped off. The Province called it \"a non-hockey play behind the play.\" Humboldt's Mike Gaber scored the winner on the ensuing power play. Jaques was described as facing at least a one-game (and likely three-game) suspension. Sources: Nanaimo Daily News April 29 1987 p.9 (image"
          - link "325077439" [ref=e398] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-04-29-nanaimo-daily-news-p9-i325077439.md
          - text: ); The Vancouver Sun April 29 1987 p.15 and p.25 (images
          - link "495257563" [ref=e399] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-04-29-the-vancouver-sun-p15-i495257563.md
          - text: ","
          - link "495257020" [ref=e400] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-04-29-the-vancouver-sun-p25-i495257020.md
          - text: ); The Province April 30 1987 p.69 (image
          - link "502021469" [ref=e401] [cursor=pointer]:
            - /url: https://www.newspapers.com/image/502021469/
          - text: ).
        - paragraph [ref=e402]:
          - text: "Quote before the Pembroke round-robin game, which Richmond won 4-3:"
          - emphasis [ref=e403]: "\"Those other teams had to be champions to get here, but we know who we have to beat to win the Centennial Cup.\""
          - text: (Star-Phoenix May 5 1987 p.15, image
          - link "512094454" [ref=e404] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-05-05-star-phoenix-p15-i512094454.md
          - text: ).
