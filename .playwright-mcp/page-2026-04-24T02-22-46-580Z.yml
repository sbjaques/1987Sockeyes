          - text: ). He scored his fourth of the series at 1:39 of the third period in Game 5 (Red Deer Advocate, April 13 1987, image
          - link "558335628" [ref=e874] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-04-13-red-deer-advocate-p7-i558335628.md
          - text: ). And when Game 7 came — with Mounties reportedly posted outside the Sockeyes' hotel rooms after a series of threats, eggs, and poured coffee — Tomlinson scored three goals in a 9-1 Richmond rout that clinched the Alberta-BC championship (Calgary Herald, April 18 1987, image
          - link "483730219" [ref=e875] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-04-18-calgary-herald-p73-i483730219.md
