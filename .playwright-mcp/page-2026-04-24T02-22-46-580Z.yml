      - heading "1987 Program Snapshot" [level=2] [ref=e362]
      - generic [ref=e363]: Dave played all his minor hockey at the North Shore Winter Club. He has played on many Provincial Championship teams. Last season Dave had an excellent season playing midget hockey in Summerland. This season has seen him lead the scoring for the Sockeyes. Dave plans to take advantage of a scholarship to Boston College [verified later as Boston University] while continuing to play hockey.
      - paragraph [ref=e364]: "Source: 1987 Abbott Cup / Centennial Cup Souvenir Program"
      - heading "Biography" [level=2] [ref=e365]
      - generic [ref=e366]:
        - heading "Dave Tomlinson — Career Biography" [level=1] [ref=e865]
        - heading "1. The call-up" [level=2] [ref=e866]
        - paragraph [ref=e382]:
          - text: The injury wire hit Maple Leaf Gardens before the puck dropped on January 7, 1993. Peter Zezel, Toronto's reliable defensive centre, had sprained his wrist. A thousand miles east, in St. John's, Newfoundland, the AHL's leading Maple Leafs scorer was told to pack. Dave Tomlinson — 51 points (21 G, 30 A) in 37 games with the farm club, a call-up that general manager Cliff Fletcher said was long overdue — caught the flight, pulled the blue-and-white sweater over his head, and lined up against the San Jose Sharks for his first shift in the National Hockey League. "He has consistently been the best player on Toronto's American Hockey League farm team," Fletcher told reporters afterwards (The Toronto Star, January 8 1993, image
          - link "949123397" [ref=e867] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1993-01-08-the-toronto-star-p10-i949123397.md
          - text: ; The Gazette, January 9 1993, image
          - link "424270274" [ref=e868] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1993-01-09-the-gazette-p35-i424270274.md
          - text: ).
        - paragraph [ref=e386]: It had taken six years — a BCJHL championship, four seasons at Boston University, an NCAA scholarship, a supplemental draft, and eighteen months of AHL apprenticeship — to get that shift. It would take another twenty-five to finish telling the story, and much of it would be told in languages other than English.
        - heading "2. Roots" [level=2] [ref=e869]
        - paragraph [ref=e388]: David Tomlinson was born May 8, 1969, in North Vancouver, British Columbia. At 5'11" and 181 pounds, shooting left, he was never the biggest skater on the ice, but by his late teens he was already the most productive. He surfaces in the public record as a 17-year-old with the Summerland Buckaroos of the BCJHL in 1985-86, where he scored 48 goals and 88 points in 52 games — a line that pried open junior-A doors up the Fraser Valley. His pre-Summerland minor hockey — the North Shore leagues that turned out most of his contemporaries — is thinly documented in the surviving newspaper record; contemporaneous BCJHL coverage simply introduced him, mid-career, as the kid from North Vancouver scoring in bunches.
        - heading "3. The Sockeyes year — 1986-87" [level=2] [ref=e870]
        - paragraph [ref=e391]: Bruce Taylor, the Burnaby businessman who bought the Richmond Sockeyes in 1985 and quickly decided he was going to win a Centennial Cup, brought in Orland Kurtenbach to coach in July 1986 and then set about building the roster. Tomlinson was one of Kurtenbach's cornerstones. He played 51 regular-season games in the BCJHL, scored 43 goals, added 65 assists, and finished with 108 points — the team's leading scorer (Richmond Sentinel, October 22 2025 banner-raising feature; BCHL 60th anniversary retrospective). Second-year forward. No one on the Sockeyes scored more.
        - paragraph [ref=e396]: He had company. Matt Hervey was "a heavy sort, with a great powerplay," Tomlinson said years later. Jason Phillips was the quietly brilliant centre on the other end of the ice. "We had an awesome team; it was a wonderful, wonderful time," Tomlinson told the Richmond News in 2012. "The owner, Bruce Taylor, wanted to put a team together to win that championship, so he brought in Kurtenbach and he kept on bringing in players that just seemed to make us stronger and stronger."
        - paragraph [ref=e402]: The regular season was the prelude. The postseason is where Tomlinson's fingerprints went onto the record in ink. He finished Richmond's 15-game playoff run with 18 goals and played a central role in every series win.
        - paragraph [ref=e405]:
          - text: The Doyle Cup against the AJHL-champion Red Deer Rustlers was where he announced himself nationally. In Game 1 at the Red Deer Arena, he opened the scoring 21 seconds in (Red Deer Advocate, April 8 1987, image
          - link "558334501" [ref=e871] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-04-08-red-deer-advocate-p21-i558334501.md
          - text: ). A night later, after being "pummelled" by Rustlers defenceman Keith Lightbown — Tomlinson refusing to drop his gloves — he drew a five-minute power play that sparked a Richmond comeback (Red Deer Advocate, April 9 1987, image
          - link "558334839" [ref=e872] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-04-09-red-deer-advocate-p11-i558334839.md
          - text: ). In the 3-1 Game 4 loss at Red Deer he scored Richmond's only goal (Daily Herald-Tribune, April 13 1987, image
          - link "731241442" [ref=e873] [cursor=pointer]:
