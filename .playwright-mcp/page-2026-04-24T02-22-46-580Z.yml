        - paragraph [ref=e408]: "\"I remember going out to play in Red Deer and we needed a police presence,\" he told the Richmond News years later. \"During the game, someone got hit in the face with an egg and coffee was poured on the coach. We beat them, but we started then to realize how serious this game was in other parts of the country.\""
        - paragraph [ref=e411]:
          - text: The Abbott Cup against the Humboldt Broncos was a seven-game war, the first act of a rivalry that would resume two weeks later. Tomlinson scored the Game-4 winner at Richmond Arena. "We don't want to be known as the team that made it through the back door," he told The Vancouver Sun afterwards (April 27 1987, image
          - link "495254117" [ref=e878] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-04-27-the-vancouver-sun-p18-i495254117.md
          - text: ). He scored the series-clinching goal with 2:37 remaining in regulation time of Game 7 (Star-Phoenix, April 30 1987, image
          - link "512312872" [ref=e879] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-04-30-star-phoenix-p45-i512312872.md
          - text: ; Times Colonist, April 30 1987, image
          - link "508878542" [ref=e880] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-04-30-times-colonist-p16-i508878542.md
          - text: ).
        - paragraph [ref=e475]:
          - text: Then came the Centennial Cup at the Humboldt Uniplex — the second round against the same Broncos, now as hosts. In the round-robin, Tomlinson scored twice in the third period to break a 2-1 game open against Pembroke (Star-Phoenix, May 5 1987, images
          - link "512094454" [ref=e881] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-05-05-star-phoenix-p15-i512094454.md
          - text: and
          - link "512094503" [ref=e882] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-05-05-star-phoenix-p17-i512094503.md
          - text: ). He scored twice more in the 6-1 round-robin loss to Humboldt (Alberni Valley Times, May 5 1987, image
          - link "560108603" [ref=e883] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-05-05-alberni-valley-times-p9-i560108603.md
          - text: ). He scored in the 9-3 semifinal demolition of Pembroke. And on the night of May 9, 1987 — the Centennial Cup final, the ninth and decisive meeting between Richmond and Humboldt — he scored the insurance marker that made it 5-2, the eventual final, at 16:53 of the third period, on a feed from Rutherford and Claringbull (Star-Phoenix, May 11 1987, image
          - link "512098543" [ref=e884] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-05-11-star-phoenix-p14-i512098543.md
