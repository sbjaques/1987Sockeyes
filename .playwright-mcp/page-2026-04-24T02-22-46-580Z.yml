        - paragraph [ref=e978]:
          - strong [ref=e979]: "Retrospective sources:"
          - text: Richmond News 2012 "Under police protection" feature; Richmond News 2012 "Throwback Thursday — Humboldt rivalry" feature; BCHL 60th Anniversary Spotlight (1980s); Richmond Sentinel October 22 2025 banner-raising feature.
        - paragraph [ref=e980]:
          - strong [ref=e981]: "Statistical sources:"
          - text: hockeydb.com (player id 5425); hockey-reference.com (tomlida01); eliteprospects.com (id 39331); Wikipedia; NHL.com profile (
          - link "8458234" [ref=e982] [cursor=pointer]:
            - /url: https://www.newspapers.com/image/8458234/
          - text: ); Boston University alumni records via hockeydb.
        - paragraph [ref=e983]:
          - strong [ref=e984]: "Gaps:"
        - list [ref=e372]:
          - listitem [ref=e373]:
            - strong [ref=e374]: Pre-Summerland minor hockey is undocumented
            - text: in the accessible newspaper corpus. The North Shore minor leagues of 1982-85 would fill in the development path but did not surface in any of the ~2,350 OCR extractions.
          - listitem [ref=e375]:
            - strong [ref=e376]: The 1991 NCAA senior year
            - text: detail — alternate captaincy, specific BU records — is thin beyond summary stat lines; deeper BU Athletics archives would add texture.
          - listitem [ref=e377]:
            - strong [ref=e378]: The Mannheim decade (1996-2002)
            - text: is the single largest content gap in English-language coverage. German-language sources (Mannheimer Morgen, Eishockey News) would surface specific title-clinching moments, linemates, and narrative detail that this bio must summarize at arm's length.
          - listitem [ref=e379]:
            - strong [ref=e380]: Specific broadcast-era dates and contracts
            - text: — the exact 2010 Team 1040 start, the 2019 departure, the Kraken hire announcement language — are drawn from industry reporting summaries rather than cited primary documents in the project corpus.
          - listitem [ref=e985]:
            - text: The
            - strong [ref=e986]: 1989 NHL Supplemental Draft
            - text: is confirmed as Toronto 1st round, 3rd overall, but a primary-source contemporaneous newspaper clip confirming the selection announcement was not located in the corpus.
