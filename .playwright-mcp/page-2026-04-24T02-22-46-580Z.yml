          - link "560108760" [ref=e885] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-05-11-alberni-valley-times-p9-i560108760.md
          - text: ).
        - paragraph [ref=e478]: "\"I scored the first goal of the game, which was nice, but I remember it was a very charged atmosphere,\" he told the Richmond News in 2012 about the final — an event etched in contemporaneous box-score ink. \"It was in their rink, and the previous series had gone to seven games. We were the enemy in there, but we never really let up. It was one of those games where we just kept pounding away.\""
        - paragraph [ref=e491]:
          - text: "A Star-Phoenix note buried in the May 6, 1987 edition had flagged the next move: Tomlinson, it reported, was bound for Boston University on scholarship (image"
          - link "512095951" [ref=e886] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-05-06-star-phoenix-p19-i512095951.md
          - text: ).
        - heading "4. Boston University — 1987-91" [level=2] [ref=e887]
        - paragraph [ref=e507]:
          - text: Jack Parker's Terriers had a deep roster when Tomlinson arrived at Walter Brown Arena in the fall of 1987. He slotted onto a line with Mike Kelfer, Joe Sacco, and Tom Dion. The Hockey East opener came on Halloween night at the Tully Forum in Billerica — a 5-0 BU shutout of Lowell in which Peter Fish recorded his first career shutout. Tomlinson's third-period goal, assisted by Rob Regan, made it 4-0 (The Boston Globe, November 1 1987, image
          - link "437934229" [ref=e888] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1987-11-01-the-boston-globe-p79-i437934229.md
          - text: ).
        - paragraph [ref=e889]:
          - text: He finished the freshman year with 16 goals, 20 assists, and 36 points in 34 games. On January 16, 1988, he scored twice in a 4-2 BU win over North Dakota at Walter Brown Arena — the second a power-play redirect of Matt Pesklewis's shot with 10 seconds left in the second period — and added an assist on Ian Wood's opener (The Boston Globe, January 17 1988, image
          - link "438845236" [ref=e890] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1988-01-17-the-boston-globe-p64-i438845236.md
          - text: ). A month later he assisted on goals by Kelfer, Dion, and Sacco in a 6-3 win over Boston College (The Boston Globe, February 28 1988, image
          - link "437977772" [ref=e891] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1988-02-28-the-boston-globe-p70-i437977772.md
          - text: ). In March, he set up Sacco in a 6-4 loss to Providence at Walter Brown (The Boston Globe, March 6 1988, image
          - link "438843894" [ref=e892] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1988-03-06-the-boston-globe-p64-i438843894.md
          - text: ).
        - paragraph [ref=e893]: "The sophomore year (1988-89) was more of the same: 16-30-46 in 34 games. The junior year dipped slightly — 15-22-37 in 43 games, a broader Terriers rotation — but the senior season, 1990-91, was Tomlinson at his collegiate peak. Wearing the alternate captain's A, he posted 30 goals and 30 assists for 60 points in 41 games, closing a four-year line of 179 points. It was a numbers-legible, professionally-projectable college career, and the NHL had already taken notice two summers earlier."
        - heading "5. The Supplemental Draft — 1989" [level=2] [ref=e894]
        - paragraph [ref=e895]: "The 1989 NHL Supplemental Draft — the league's short-lived mechanism for adding US college players who had been missed by the regular entry draft — convened that summer. The Toronto Maple Leafs, in the first round, third overall, selected Dave Tomlinson. He had two more BU seasons ahead, but the path beyond them was now drawn: St. John's, Newfoundland, home of Toronto's AHL affiliate, was waiting."
        - heading "6. The apprenticeship — St. John's, 1991-94" [level=2] [ref=e896]
        - paragraph [ref=e897]:
          - text: Tomlinson turned pro in the fall of 1991, reporting to Marc Crawford's St. John's Maple Leafs. The AHL in the early 1990s was a dense, physical, talent-rich league — and Tomlinson, as Moncton Hawks coach Rob Laird would later concede, was one of its complete forwards. "Dave Tomlinson killed us last year and I've always wanted that guy on my team," Laird told the Times-Transcript in November 1993 (image
          - link "1107716258" [ref=e898] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1993-11-10-the-times-transcript-p27-i1107716258.md
          - text: "). Tomlinson credited the development to his college coach: \"My coach at BU (Jack Parker), really opened my eyes and made me a more complete player.\""
        - paragraph [ref=e899]:
          - text: In his first AHL season he scored 23 goals and 57 points in 75 games and got a three-game cup of coffee in Toronto. The second season was the breakthrough. He centred a productive St. John's line with Patrik Augusta and Todd Hawkins — the three combined for five goals and 12 points in a 6-2 AHL win over Adirondack on October 20, 1992 (The Toronto Star, October 22 1992, image
          - link "949148192" [ref=e900] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1992-10-22-the-toronto-star-p23-i949148192.md
          - text: ). On November 1, 1992, he scored twice in a franchise-record 10-2 St. John's rout of Hershey (The Toronto Star, November 2 1992, image
          - link "949130354" [ref=e901] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1992-11-02-the-toronto-star-p14-i949130354.md
          - text: ).
        - paragraph [ref=e902]:
          - text: By January he was leading the Baby Leafs in scoring at 21-30-51 through 37 games and Fletcher had no more reason to wait. The January 7, 1993 recall gave him his NHL debut against San Jose. He returned to St. John's later that month (The Toronto Star, January 18 1993, image
          - link "949130250" [ref=e903] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1993-01-18-the-toronto-star-p13-i949130250.md
          - text: ), finished the AHL season with 84 points in 70 games, and led the entire American Hockey League with six shorthanded goals (Times-Transcript, April 14 1993, image
          - link "1107681099" [ref=e904] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1993-04-14-the-times-transcript-p12-i1107681099.md
          - text: ). By playoff time he was centring a hot St. John's line with Kent Manderville and Patrik Augusta (Times-Transcript, April 13 1993, image
          - link "1107674585" [ref=e905] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1993-04-13-the-times-transcript-p8-i1107674585.md
          - text: ).
        - heading "7. The trade — August 1993" [level=2] [ref=e906]
        - paragraph [ref=e907]:
          - text: On August 3, 1993, the expansion Florida Panthers — eleven weeks away from their inaugural puck drop — paid Toronto a future draft pick for Tomlinson. Within hours, Florida flipped him to Winnipeg for disgruntled centre Jason Cirone (Times-Transcript, August 4 1993, image
          - link "1107790757" [ref=e908] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1993-08-04-the-times-transcript-p11-i1107790757.md
          - text: "). The destination for his bags, again, was an AHL town: the Moncton Hawks, the Jets' farm club."
        - paragraph [ref=e909]:
          - text: He did what he had always done. He scored 11 goals in his first 12 Moncton games. By November 10, Laird was calling him "Mr. Everything" in a Times-Transcript feature (image
          - link "1107716258" [ref=e910] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1993-11-10-the-times-transcript-p27-i1107716258.md
          - text: ). On December 8, 1993, he was recalled by the Jets and spent 23 games in Winnipeg before being returned to Moncton in late February (Times-Transcript, December 11 1993, image
          - link "1107681995" [ref=e911] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1993-12-11-the-times-transcript-p13-i1107681995.md
          - text: ; Times-Transcript, February 28 1994, image
          - link "1107761162" [ref=e912] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1994-02-28-the-times-transcript-p17-i1107761162.md
          - text: ). In the AHL regular season he finished 23-23-46 in 39 games.
        - paragraph [ref=e913]:
          - text: The Moncton playoff run that spring was among the more improbable Tomlinson was part of. The Hawks, a sub-.500 club, upset the regular-season-champion St. John's Maple Leafs in the Atlantic Division final. Tomlinson — who had spent the opening round quietly, telling the Times-Transcript, "I've been quite happy with my two-way play, but I'm also expected to contribute more and score some goals. All I can say is that I'm due" (April 25 1994, image
          - link "1107950086" [ref=e914] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1994-04-25-the-times-transcript-p15-i1107950086.md
          - text: ) — scored in Game 5 of a 5-0 shutout over his old farm team at the Moncton Coliseum on May 8, 1994 (Telegraph-Journal, May 9 1994, image
          - link "1111149754" [ref=e915] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1994-05-09-telegraph-journal-p11-i1111149754.md
          - text: ). He finished the AHL playoffs 6-6-12 in 20 games.
        - heading "8. Cincinnati, Florida, and the IHL prime — 1994-96" [level=2] [ref=e916]
        - paragraph [ref=e917]:
          - text: "The 1994-95 NHL lockout sent most fringe NHLers to the minors for the fall. Tomlinson went to the Cincinnati Cyclones, Florida's IHL affiliate, and proceeded to lead the IHL's Eastern Division in scoring: 79 points (28 G, 51 A) in 37 games, plus-19, through February. The Panthers recalled him on February 20, 1995, to fill the gap created by Stu Barnes's eye injury (South Florida Sun-Sentinel, February 21 1995, image"
          - link "239018639" [ref=e918] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1995-02-21-south-florida-sun-sentinel-p31-i239018639.md
          - text: ). He bounced between healthy scratches and limited NHL shifts for three weeks — "limited action" was the charitable framing — and by early March was back in Ohio (South Florida Sun-Sentinel, March 5 1995, image
          - link "238818945" [ref=e919] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1995-03-05-south-florida-sun-sentinel-p42-i238818945.md
          - text: ; Miami Herald, March 5 1995, image
          - link "639202890" [ref=e920] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1995-03-05-the-miami-herald-p38-i639202890.md
          - text: "). His five NHL games with Florida that season closed out a 42-game NHL career spread across four seasons: 1 goal, 3 assists, 4 points."
        - paragraph [ref=e921]: The Cincinnati line was where the points actually lived. He finished 1994-95 with 110 points (38-72) in 78 IHL games and added 10 more in the playoffs. The 1995-96 encore was 96 points in 81 games with 127 PIM — he was playing heavier minutes and a harder game — plus 16 more points in 17 playoff games. He was, at 27, one of the IHL's most productive forwards.
        - paragraph [ref=e922]:
          - text: In June 1996, after two seasons among the Cyclones' top three scorers, he made the move that would define the second half of his career. Adler Mannheim of the German DEL called with a one-year offer that, he told the Cincinnati Enquirer, "more than doubled" his Cincinnati salary of just under $100,000 (June 15 1996, image
          - link "102209856" [ref=e923] [cursor=pointer]:
            - /url: https://github.com/sbjaques/1987Sockeyes/blob/main/src/content/private/ocr/1996-06-15-the-cincinnati-enquirer-p36-i102209856.md
          - text: ). "I wanted to be paid somewhere around $140,000. But Ron (Smith, Cyclones director of hockey operations) wanted to wait until after the season, which gets a little too late. Mannheim called, and we took their deal."
        - heading "9. A decade in Germany — Mannheim, Nuremberg, Hamburg, Krefeld" [level=2] [ref=e924]
        - paragraph [ref=e925]: Tomlinson arrived in Mannheim in the fall of 1996 and did not leave for six full seasons. The Adler — the Eagles — were building a dynasty, and he was one of the North American imports around whom it was built. He scored 51 points his first DEL season (1996-97), then 50 (1997-98), 40, 50, and 45. Across six Mannheim seasons he dressed for 290 regular-season DEL games, scored 101 goals, added 160 assists, and was part of four DEL championships — 1997, 1998, 1999, and 2001 — a run of titles that remains one of the most dominant stretches in German professional hockey history.
        - paragraph [ref=e926]: Coverage of this period in English-language papers is sparse; Mannheim's rise is mostly a German-language story, told in Mannheimer Morgen and the Eishockey News, and remains the least-reported phase of Tomlinson's career in the materials accessible from North America.
        - paragraph [ref=e927]: "In 2002, at 33, he moved on — first to the Nuremberg Ice Tigers for part of a season (18 games, 11 points), then to the expansion Hamburg Freezers for 2003-04 and 2004-05, where he was a reliable two-way centre (46-8-17-25 then 43-14-9-23, with 109 PIM in the first of those two years — he was still playing physical). He closed out the playing career in 2005-06 with a brief nine-game cameo split between Krefeld Penguins regular-season and playoff rosters. Fifteen pro seasons: 1991-92 to 2005-06."
        - heading "10. The broadcast booth — 2010-present" [level=2] [ref=e928]
        - paragraph [ref=e929]: The transition to broadcasting started in Vancouver. By 2010, Tomlinson was working as the colour analyst on Vancouver Canucks radio on Team 1040 — later TSN 1040 — a job he held for nine seasons, through 2019. When TSN 1040 closed, he briefly stepped back, but the voice and the résumé were too useful to stay idle.
        - paragraph [ref=e930]: In October 2021, the Seattle Kraken — NHL expansion team No. 32 — named him their inaugural radio colour analyst. He called the franchise's first puck drops from the booth at Climate Pledge Arena, riding a second expansion-era wave three decades after his first.
        - paragraph [ref=e931]: In September 2023, he came home. Sportsnet named Tomlinson the primary colour commentator for Vancouver Canucks regional broadcasts — the job he had occupied on radio, now on television, for the team he had grown up watching. At 54, he was calling the games of a franchise whose first coach, Orland Kurtenbach, had recruited him to Richmond thirty-seven years earlier.
        - heading "11. Legacy" [level=2] [ref=e932]
        - paragraph [ref=e933]: Dave Tomlinson is, by almost any honest accounting, the most distinguished on-ice product of the 1987 Richmond Sockeyes championship run. His pre-pro totals — 88 points with Summerland, 108 with Richmond, 179 across four years at Boston University — project cleanly to the career that followed. The 42 NHL games are the thinnest slice of it. The 15 years of pro work, the four DEL titles, the IHL scoring crown, the Centennial Cup, and the two decades in the broadcast booth are the body.
        - paragraph [ref=e934]: In 2025, the BC Hockey Hall of Fame inducted the 1987 Sockeyes as a team. Tomlinson was on the ice at Richmond Arena in October 2025 when the championship banner was raised to the rafters; Sentinel reporters buttonholed him after the first period of the PJHL opener below. "Canucks broadcaster Dave Tomlinson, who played in 51 regular season games with 43 goals and 65 assists as the leading scorer," the paper wrote, getting the stat line exactly right (Richmond Sentinel, October 22 2025).
        - paragraph [ref=e935]: He is one of the four or five BC-born players of his generation to have built a full pro career out of the BCJHL without the WHL development path — a BU scholarship, a supplemental-draft notice, an NHL cup of coffee, an AHL scoring title in all but name, an IHL Eastern-Division scoring crown, four German championships, and a broadcast booth in Vancouver. When he tells 1987 stories in retirement — the eggs and coffee in Red Deer, the 5-2 final in Humboldt, the first-period goal he scored to open the Centennial Cup final — he is telling the story of the career that started that night.
