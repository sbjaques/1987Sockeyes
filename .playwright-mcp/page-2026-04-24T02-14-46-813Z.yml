      - generic [ref=e55]:
        - paragraph [ref=e56]: "The 1986-87 Richmond Sockeyes finished the regular season 38-14-0 — Coast Division champions, with a +104 goal differential and three scorers in the BCJHL top ten. Dave Tomlinson (43-65-108, 2nd in the league), Rob Clarke (65-38-103, 3rd), and Bryon Moller (27-64-91, 6th) anchored an offence built on line chemistry: Phillips–Kozak–Hardy, and Tomlinson at centre."
        - paragraph [ref=e57]: They went 15-0 through the BCJHL playoffs, sweeping the Nanaimo Clippers and North Delta Flyers before ending the favoured Kelowna Packers' season in five. Kelowna had gone 45-5-2 — the best regular-season record in Canadian Junior A hockey — and didn't win a game in the final.
        - paragraph [ref=e58]: The Doyle Cup against the Red Deer Rustlers turned the season. Richmond fell behind 3-2. The Rustlers had won three straight, snapping a 17-game Sockeyes winning streak. With one game left in their season, the Sockeyes won Game 6, then travelled to Red Deer and ended it 9-1.
        - paragraph [ref=e59]: The Abbott Cup went seven games against the Humboldt Broncos, who had gone 55-9 in the SAJHL and ridden a 17-game winning streak of their own into the Western Final. Richmond broke the streak and took the series 4-3. At the Centennial Cup in Humboldt, the Sockeyes beat Dartmouth 7-3, Pembroke 4-3, and — after dropping a round-robin game to the hosts 6-1 — routed Pembroke 9-3 in the semifinal and beat Humboldt 5-2 in the final on May 9, 1987 at the Uniplex. Frank Romeo was named tournament MVP. Jason Phillips was named Most Gentlemanly Player and to the tournament All-Star team, recording a hat trick in the final.
